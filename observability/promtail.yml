---
server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: newschat
    static_configs:
      - targets:
          - localhost
        labels:
          job: newschat
          __path__: /var/log/newschat/*.log
    pipeline_stages:
      # Parse the standard Python log format:
      # 2024-01-15 10:30:00,123 INFO newschat.ingest.loader: message
      - regex:
          expression: >-
            ^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3})\s+(?P<level>\w+)\s+(?P<logger>[^:]+):\s+(?P<message>.*)$
      - labels:
          level:
          logger:
      - timestamp:
          source: timestamp
          format: "2006-01-02 15:04:05,000"
