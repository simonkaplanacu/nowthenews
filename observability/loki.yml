---
auth_enabled: false

server:
  http_listen_port: 3100

common:
  ring:
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: ./data/observability/loki

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: ./data/observability/loki/chunks

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h    # 7 days

compactor:
  working_directory: ./data/observability/loki/compactor
