---
# Observability stack: Loki (log store) + Promtail (log shipper) + Grafana (GUI)
# Usage: docker compose -f docker-compose.observability.yml up -d

services:
  loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./observability/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./observability/promtail.yml:/etc/promtail/promtail.yml:ro
      - ./logs:/var/log/newschat:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/ds.yml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  loki-data:
  grafana-data:
